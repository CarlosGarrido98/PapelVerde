<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papel Verde</title>
    <link rel="icon"type="image/png" href="img/LogoLibro.ico">
    <!-- Links a Boostrap-->
    <link rel="style/css" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <!-- Header  -->
    <header class="bg-light">
        <div class="container">
            <div class="row align-items-center">
                
                <div class="col-xl-3 col-4">
                    <button class="btn bi bi-facebook"></button>
                    <button class="btn bi bi-instagram"></button>
                    <button class="btn bi bi-twitter-x"></button>
                </div>
                
                <div class="col-xl-6 col-4 d-flex justify-content-center">
                    <img src="img/Logotipo.png" class="img-fluid" style="max-width: 150px;" alt="Logo de Papel Verde">
                </div>

                <div class="col-xl-3 col-4 d-flex justify-content-end">
                    <button class="btn bi bi-person"></button>
                    <button class="btn bi bi-cart"></button>
                </div>
                
            </div>
        </div>
    </header>

     <!-- Section -->
    <section class ="container-fluid bg-white">

        
       <div class="row justify-content-center"> 

            <!-- Formulario de suscripción -->
            
            <div class="col-12 col-xl-6 Formulario justify-content-center align-items-center " style="background-color: #F1F3F2;">
                <div class="m-4">
                    <h2 class="text-center mb-4">Únete a Nuestra Comunidad</h2>
                    <p>Recibe las últimas noticias , ofertas, exclusivas , y recomendaciones personalizadas de libros sostenibles.</p>
                    <form>
                        <div class="mb-3">
                            <label for="email" class="form-label">Correo electrónico:</label>
                            <input type="email" class="form-control" id="email" placeholder="Ingresa tu correo electrónico">
                        </div>
                    
                        <button type="submit" class="btn btn-success">Únete gratis -> </button>
                    </form>
                </div>
                
            </div>

            <!-- Ofertas especiales -->
            <div class="Ofertas col-12 col-xl-6">

                <h2 class="text-center mb-4 ">Ofertas especiales</h2>

                
                <div class="articulos row justify-content-between">
                    
                        <div class="Senna col-6">
                            <div class="card">
                                <div style="background-image: url(img/senna.webp); height: 400px; background-size: cover; background-position: center;"></div>
                                <div class="card-body">
                                    <h5 class="card-title">La Ultima Noche de Ayrton Senna</h5>
                                    <p class="card-text">Giorgio Terruzzi</p>
                                    <p class="prize-text">€29,99</p>
                                    <a href="#" class="btn btn-success">Añadir</a>
                                </div>
                            </div>
                        </div>

                        <div class="Michael col-6">
                            <div class="card" >
                                <div style="background-image: url(img/michael.webp); height: 400px; background-size: cover; background-position: center;"></div>                                <div class="card-body">
                                    <h5 class="card-title">¿Quien mato a Michael Jackson?</h5>
                                    <p class="card-text">Paul morley</p>
                                    <p class="prize-text">€19,99</p>
                                    <a href="#" class="btn btn-success">Añadir</a>
                                </div>
                            </div>
                        </div>
                </div>
                
            </div>
       </div>

    <!-- Carrusel de libros -->
     
    


    
</section>

<script src="js/carousel.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
