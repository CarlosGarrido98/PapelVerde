<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Papel Verde</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Estilo rápido para que veas las tarjetas mientras diseñas */
        .swiper { width: 100%; padding: 50px 0; }
        .book-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 200px;
        }
        /* Personalización de flechas para que se parezcan a tu imagen */
        .swiper-button-next, .swiper-button-prev {
            color: #1a3c34; 
            background: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .swiper-button-next::after, .swiper-button-prev::after { font-size: 18px; }
        

        
    </style>
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>El principito</h5>
                        <p>12.99€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>El principito</h5>
                        <p>12.99€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>El principito</h5>
                        <p>12.99€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>El principito</h5>
                        <p>12.99€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>1984</h5>
                        <p>14.50€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>Rayuela</h5>
                        <p>16.99€</p>
                    </div>
                </div>
                <div class="swiper-slide">
                    <div class="book-card">
                        <h5>El Hobbit</h5>
                        <p>14.25€</p>
                    </div>
                </div>
            </div>
            
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        const swiper = new Swiper(".mySwiper", {
            slidesPerView: 1,
            spaceBetween: 20,
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            breakpoints: {
                640: { slidesPerView: 2 },
                1024: { slidesPerView: 4 },
            },
        });
    </script>
</body>
</html>
