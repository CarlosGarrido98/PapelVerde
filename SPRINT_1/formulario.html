<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="icon"type="image/png" href="img/imgPapelVerde/Logoico.ico">
    <!-- Links a Boostrap-->
    <link rel="stylesheet" href="css/formstyle.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">


</head>
<body class="bg-light">

<!-- Header  -->
    <header class="bg-light">
        <div class="container">
            <div class="row align-items-center">
                
                <div class="col-xl-3 col-4 d-xl-block d-none">
                    <a href="https://www.facebook.com"> <button class="btn bi bi-facebook fs-5"></button></a>   
                    <a href="https://www.instagram.com"> <button class="btn bi bi-instagram fs-5"></button></a>
                    <a href="https://www.twitter.com"> <button class="btn bi bi-twitter-x fs-5"></button></a>
                </div>

                <div class="col-xl-3 col-4 d-xl-none d-flex justify-content-around">
                    <a href="https://www.facebook.com" class="bi bi-facebook w-25 text-dark"></a>   
                    <a href="https://www.instagram.com" class="bi bi-instagram w-25 text-dark"></a>
                    <a href="https://www.twitter.com" class="bi bi-twitter-x w-25 text-dark"></a>
                </div>
                
                <div class="col-xl-6 col-4 d-flex justify-content-center">
                    <a href="index.html"><img src="img/imgPapelVerde/Logotipo1.png" class="img-fluid" style="max-width: 150px;" alt="Logo de Papel Verde"></a>
                </div>

                <div class="col-xl-3 col-4 d-flex justify-content-end">
                    <button class="btn bi bi-person fs-5"></button>
                    <button class="btn bi bi-cart fs-5"></button>
                </div>
                
            </div>
        </div>
    </header>

    
    <!-- Section -->

    <section class ="Formulario container-fluid bg-white">
    

    <h1 class="text-center" style="color: #254B36;"> Únete a Papel Verde </h1>
    <form id="registroForm" >

            <!-- Nombre -->
            <label>Nombre y Apellidos</label>
            <input type="text" id="nombre" required placeholder="Ej: Carlos Pérez">
            <span class="warn" id="nameError"></span>
            
            <!-- Correo -->
            <label>Correo electrónico </label>
            <input type="email" id="email" required>
            <span class="warn" id="emailError"></span>

            <!-- Contraseña -->
            <label>Contraseña </label>

                <div style="position: relative;">
                <input type="password" id="password" required>
                <i id="togglePassword" 
                class="bi bi-eye" 
                style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer;">
                </i>
                </div>
            
            <span class="warn" id="passwordError"></span>

            <!-- Confirmar contraseña -->
            <label>Confirmar contraseña </label>
            <input type="password" id="confirmPassword" required>
            <span class="warn" id="confirmPasswordError"></span>

            <!-- Sexo -->
            <label>Sexo</label>
            <select>
                <option value="">Seleccionar</option>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Otro</option>
            </select>

            <!-- Fecha -->
            <label>Fecha de nacimiento</label>
            <input type="date">

            <!-- Dirección -->
            <label>Dirección</label>
            <input type="text" id="direccion">

            <!-- País -->
            <label>País</label>
            <select id="pais">
                <option value="">Seleccionar</option>
                <option>España</option>
                <option>México</option>
                <option>Argentina</option>
                <option>Colombia</option>
            </select>

            <!-- Tarjeta (oculta al inicio) -->
            <div id="tarjetaContainer" >
                <label>Tarjeta de crédito</label>
                <input type="text" id="tarjeta" placeholder="1234 5678 9012 3456">
            </div>

            <!-- Checkboxes -->
            <label>
                <input type="checkbox"> Activar notificaciones
            </label>

            <label>
                <input type="checkbox"> Recibir revista digital
            </label>

            <br><br>
            <button type="submit">Registrarse</button>

            </form>

    </section>




    <!-- FOOTER  -->

<footer class="container-fluid p-2" style='background-image: url("img/bg-footer.jpeg")'>
    
    <div class="row m-2">
        <div class="col-xl-6 col-12">
            <p class="text-bold text-light fs-5">Papel verde</p>
            <span><i class="bi bi-geo-alt"></i>Calle Sostenible, 123, Madrid , España</span>
            <br>
            <span><i class="bi bi-telephone"></i>+34 123 456 789</span>
            <br>
            <span><i class="bi bi-envelope"></i>info@papelverde.com</span>
        
            <p>Comprometidos con la lectura sostenible y el cuidado del medio ambiente.</p>
           
        </div>

        <div class="row col-xl-6 col-12">
            <div class="text-end d-xl-block d-none">
                <span class="text-light text-end fs-5"> Síguenos</span>
            </div>
            <!-- Redes sociales  -->
            <div class="col-xl-12 col-12 d-xl-flex d-none justify-content-end">
                <a href="https://www.twitter.com"><button class="btn-social rounded-circle shadow-lg bi bi-twitter-x mx-1"></button></a>
                <a href="https://www.instagram.com"><button class="btn-social rounded-circle shadow-lg bi bi-instagram mx-1"></button></a>
                <a href="https://www.facebook.com"><button class="btn-social rounded-circle shadow-lg bi bi-facebook mx-1"></button></a>
            </div>

            <!-- Redes sociales para móvil -->
            <div class="col-xl-12 col-12 d-xl-none d-flex justify-content-center mb-3">
                <a href="https://www.twitter.com"><button class="btn-social rounded-circle shadow-lg bi bi-twitter-x mx-1"></button></a>
                <a href="https://www.instagram.com"><button class="btn-social rounded-circle shadow-lg bi bi-instagram mx-1"></button></a>
                <a href="https://www.facebook.com"><button class="btn-social rounded-circle shadow-lg bi bi-facebook mx-1"></button></a>
            </div>

        </div>

        <!-- Línea divisoria -->
        <hr class="d-xl-block d-none">
        <div class="col-12 my-3 text-center">
            <span>© 2026 Papel Verde. Todos los derechos reservados</span>
        </div>
    </div> 
</footer>


<script src="js/validaciones.js">
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
